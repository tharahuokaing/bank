<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HUOKAING THARA Banking System</title>
  <link rel="stylesheet" href="styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>

  <div class="login-container" id="loginSection">
    <h2>Khmer Bank Portal</h2>
    <form id="loginForm">
      <div class="input-group">
        <input type="text" id="username" placeholder="Username" required>
      </div>
      <div class="input-group">
        <input type="password" id="password" placeholder="Password" required>
      </div>
      <button type="submit">Login</button>
    </form>
    <p id="loginMessage" class="login-message" role="alert" aria-live="assertive"></p>
    
    <div id="systemHeartbeat"></div>
  </div>

  <div class="hologram" id="summaryBox" style="display:none;">
    <header style="text-align: center;">
      <h1>Project Phases Overview</h1>
      <div id="aiStatusBubble" style="font-style: italic; color: #0ff; margin-bottom: 20px;"></div>
    </header>

    <div id="searchContainer"></div>

    <ol id="phasesList" aria-label="Project Phases" style="text-align: left; max-width: 680px; margin: 1rem auto 2rem auto;">
      </ol>

    <section id="phaseChecklistContainer" style="text-align:left; max-width:680px; margin: 0 auto 2rem auto;"></section>

    <div style="text-align: center;">
      <button id="logoutBtn" aria-label="Logout">Logout</button>
    </div>
  </div>

  <script src="login.js"></script>
  <script src="ai_core.js"></script>
  <script src="search.js"></script>
  <script src="security_2fa.js"></script>
  <script src="master_loader.js"></script>

  <script src="phase.js"></script>
  <script src="phase1.js"></script>
  <script src="phase2.js"></script>
  <script src="phase3.js"></script>
  <script src="phase4.js"></script>
  <script src="phase5.js"></script>
  <script src="phase6.js"></script>
  <script src="phase7.js"></script>
  <script src="js/phase8.js"></script> <script src="phase8.js"></script> 
  <script src="phase9.js"></script>
  <script src="phase10.js"></script>
  <script src="phase11.js"></script>
  <script src="phase12.js"></script>
  <script src="phase13.js"></script>
  <script src="phase14.js"></script>
  <script src="phase15.js"></script>
  <script src="phase16.js"></script>
  <script src="phase18.js"></script>

  <script src="bakong_integration.js"></script>
  <script src="charter_logic.js"></script>
  <script src="stress_test.js"></script>
  <script src="soc_defense.js"></script>

</body>
</html>
