<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Khmer Bank Legitimacy Review Portal</title>
  <link rel="stylesheet" href="styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
  <!-- Login Section -->
  <div class="hologram" id="loginBox">
    <h1>Bank Portal Login</h1>
    <form id="loginForm" autocomplete="off" spellcheck="false">
      <label for="username">Username:</label><br />
      <input type="text" id="username" name="username" required autocomplete="username" /><br /><br />

      <label for="password">Password:</label><br />
      <input type="password" id="password" name="password" required autocomplete="current-password" /><br /><br />

      <!-- Remember Me checkbox appended by script -->

      <button type="submit">Login</button>
    </form>
    <p id="loginMessage" class="login-message" role="alert" aria-live="assertive"></p>
  </div>

  <!-- Summary / Dashboard Section (hidden by default) -->
  <div class="hologram" id="summaryBox" style="display:none;">
    <h1>Project Phases Overview</h1>
    <ol id="phasesList" aria-label="Project Phases" style="text-align: left; max-width: 680px; margin: 1rem auto 2rem auto;"></ol>

    <section id="phase2Checklist" style="text-align:left; max-width:680px; margin: 0 auto 2rem auto;" aria-labelledby="phase2Heading">
      <!-- Phase 2 checklist populated dynamically -->
    </section>

    <button id="logoutBtn" aria-label="Logout">Logout</button>
  </div>

  <script src="script3.js"></script>
  <script src="script4.js"></script>
  <script src="script5.js"></script>
  <script src="script6.js"></script>
  <script src="script7.js"></script>
  <script src="script8.js"></script>
  <script src="script9.js"></script>
  <script src="script10.js"></script>
  <script src="script11.js"></script>
  <script src="script12.js"></script>
  <script src="script13.js"></script>
  <script src="script14.js"></script>
  <script src="script15.js"></script>
  <script src="script16.js"></script>
  <script src="script17.js"></script>
  <script src="ai_core.js"></script>
  <script src="search.js"></script>
  <script src="security_2fa.js"></script>
</body>
</html>
